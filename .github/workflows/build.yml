name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties from secrets
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> local.properties
          echo "CLOUDFLARE_NAMESPACE_ID=${{ secrets.CLOUDFLARE_NAMESPACE_ID }}" >> local.properties
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> local.properties
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build debug APK
        id: build
        shell: bash
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace 2>&1 | tee build_log.txt
        continue-on-error: true

      - name: Post build log on failure (temporary debug step)
        if: steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 build_log.txt > truncated_log.txt
          gh api repos/${{ github.repository }}/issues -f title="CI debug log $(date +%s)" -f body="$(cat truncated_log.txt)"

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-messenger-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          body: |
            🚧 **Beta release** — this app is still in active development. Expect bugs.
            Found one? Please [open an issue](../../issues/new).
