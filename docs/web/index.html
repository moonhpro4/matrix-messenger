<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Messenger — Web (Coming Soon)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12141c; --bg-panel: #1e222f; --line: #2a2f3f;
    --text: #ecedf3; --text-dim: #8a8fa3; --green: #3ed598; --amber: #f2a65a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin: 0 0 12px; font-size: 22px; }
  a { color: var(--green); }
  .box {
    background: var(--bg-panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 40px; max-width: 440px; text-align: center;
  }
  .icon {
    width: 50px; height: 50px; border-radius: 50%; background: rgba(242,166,90,0.12);
    color: var(--amber); display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 20px;
  }
  p { color: var(--text-dim); font-size: 14.5px; line-height: 1.6; margin: 0 0 24px; }
  .btn {
    display: inline-block; padding: 11px 20px; border-radius: 8px; border: 1px solid var(--line);
    color: var(--text); font-size: 14px; font-weight: 500;
  }
  .btn:hover { border-color: var(--green); }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">🛠</div>
    <h1>Still in deployment</h1>
    <p>Our web version isn't working yet — we're still setting it up. Please check back later, or use the Android app in the meantime.</p>
    <a class="btn" href="../">← Back to Matrix Messenger</a>
  </div>
</body>
</html>
